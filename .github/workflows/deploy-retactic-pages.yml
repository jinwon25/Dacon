name: Deploy RE:TACTIC to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "내가 축구 감독이라면/**"
      - ".github/workflows/deploy-retactic-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: retactic-pages
  cancel-in-progress: true

defaults:
  run:
    working-directory: "내가 축구 감독이라면"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: "내가 축구 감독이라면/package-lock.json"
      - name: Install
        run: npm ci
      - name: Verify production build
        run: npm run verify
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "내가 축구 감독이라면/dist"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
